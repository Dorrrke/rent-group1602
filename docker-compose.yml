services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rents
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - RENTAL_SERVICE_DB_DSN=postgres://user:password@db:5432/rents?sslmode=disable
    volumes:
      - ./migrations:/root/migrations
    depends_on:
      - db